name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: webhookpipe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d webhookpipe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/webhookpipe_test
      - run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/webhookpipe_test
          JWT_SECRET: ci-secret
          NODE_ENV: test
          PORT: 3000
          WORKER_POLL_INTERVAL_MS: 1000
          MAX_DELIVERY_ATTEMPTS: 3
          DELIVERY_TIMEOUT_MS: 5000
      - name: Worker smoke check
        run: |
          set +e
          timeout 10s npm run worker
          code=$?
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            exit "$code"
          fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/webhookpipe_test
          JWT_SECRET: ci-secret
          NODE_ENV: test
          PORT: 3000
          WORKER_POLL_INTERVAL_MS: 1000
          MAX_DELIVERY_ATTEMPTS: 3
          DELIVERY_TIMEOUT_MS: 5000

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build

  docker:
    name: Docker Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Prepare env files for compose
        run: |
          mkdir -p backend/src/db
          cat > backend/src/db/.env <<'EOF'
          POSTGRES_DB=webhookpipe
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          EOF

          if [ ! -f backend/.env ]; then
            cat > backend/.env <<'EOF'
            NODE_ENV=development
            PORT=3000
            DATABASE_URL=postgres://postgres:postgres@postgres:5432/webhookpipe
            JWT_SECRET=ci-secret
            WORKER_POLL_INTERVAL_MS=5000
            MAX_DELIVERY_ATTEMPTS=3
            DELIVERY_TIMEOUT_MS=10000
            EOF
          fi
      - name: Validate docker compose
        run: docker compose config
